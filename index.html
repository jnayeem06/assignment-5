<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!--daisy ui-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <!--font awesome-->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

     <!--font-->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    
    <style>

        body {

              font-family: "Geist", sans-serif;
        }
    </style>

</head>

  <body class="bg-gray-200 min-h-screen flex items-center justify-center">

<div class="bg-white w-[420px] p-8 rounded-lg shadow-md">

  <!-- Logo Section -->
  <div class="text-center mb-6">
    <img src="./github-logo.png" alt="GitHub Logo" class="w-20 h-20 mx-auto mb-4" />
    <h1 class="text-2xl font-semibold">GitHub Issues Tracker</h1>
    <p class="text-gray-500 text-sm">Sign in to manage your issues</p>
  </div>

  <!-- Form -->
  <form id="loginForm">

    <!-- Username -->
    <div class="mb-4">
      <label for="usernameInput" class="text-sm font-medium">Username</label>
      <input id="usernameInput" type="text" placeholder="Username" class="input input-bordered w-full mt-1" required />
      <p class="text-xs text-blue-500 mt-1">Default: admin</p>
    </div>

    <!-- Password -->
    <div class="mb-5">
      <label for="passwordInput" class="text-sm font-medium">Password</label>
      <input id="passwordInput" type="password" placeholder="Password" class="input input-bordered w-full mt-1" required />
      <p class="text-xs text-blue-500 mt-1">Default: admin123</p>
    </div>

    <!-- Sign In Button -->
    <button type="submit" class="btn w-full text-white border-none bg-gradient-to-r from-purple-600 to-blue-600">
      Sign In
    </button>

  </form>

  <!-- OR -->
  <div class="text-center text-gray-400 my-4">OR</div>

  <!-- Demo Credentials -->
  <div class="bg-gray-100 p-4 rounded text-center text-sm">
    <p class="text-gray-500 mb-2">Demo Credentials:</p>
    <p><span class="font-semibold">Username:</span> admin</p>
    <p><span class="font-semibold">Password:</span> admin123</p>
  </div>

</div>
 
    <script src="./script.js/login.js"></script>
</body>
</html>
