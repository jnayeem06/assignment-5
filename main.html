 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Issue Tracker</title>

<!-- DaisyUI -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

<!-- Tailwind -->
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

<!-- Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<style>

 body{
font-family: "Geist", sans-serif;
}
</style>

</head>

<body class="bg-gray-100 space-y-4">

<!-- ================= NAVBAR ================= -->

<div class="navbar bg-white shadow px-6">

<!-- LEFT -->

<div class="flex items-center gap-2 flex-1">

<img src="./github-logo.png" class="w-10 h-10">

<h1 id="site-title" class="text-lg font-semibold">
GitHub Issues Tracker
</h1>

</div>

<!-- ================= RIGHT SECTION ================= -->
<div class="flex flex-col sm:flex-row items-start sm:items-center gap-2 sm:gap-3">

   
  <div>
     
      
     
    <input
      
      id="search-input"
      type="text"
      placeholder="Search issues..."
      class="input input-bordered pl-10 w-full sm:w-56 py-2 rounded-md">

      
 
  </div>

  <!-- New Issue Button -->
  <button id="new-issue-btn" class="btn btn-primary rounded-md flex items-center gap-2">
    <i class="fa-solid fa-plus"></i>
    New issue
  </button>

</div>
 
 

</div>

  <!--button-->

<div class="flex items-center space-x-2 bg-white p-2 rounded-lg border border-gray-100 w-fit" id="filter-container">
  
  <button id="btn-all" class="filter-btn px-6 py-2 rounded-md text-sm font-medium bg-[#5D00FF] text-white transition-all duration-200">
    All
  </button>

  <button id="btn-open" class="filter-btn px-6 py-2 rounded-md text-sm font-medium text-gray-500 border border-gray-200 bg-white hover:bg-blue-200 transition-all duration-200">
    Open
  </button>

  <button id="btn-closed" class="filter-btn px-6 py-2 rounded-md text-sm font-medium text-gray-500 border border-gray-200 bg-white hover:bg-purple-200 transition-all duration-200">
    Closed
  </button>
  
</div>


   
   

 <!-- Issue Info -->
<div class="bg-white p-5 rounded-lg shadow flex justify-between items-center">

  <div class="flex items-center gap-3">

    
    <div class="text-2xl w-5 h-5">
      <img src="./Aperture.png">
    </div>

    <div>
      <h2 id="issue-count" class="font-semibold text-lg">
        50 Issues
      </h2>

      <p class="text-gray-500 text-sm">
        Track and manage your project issues
      </p>
    </div>

  </div>

  <div class="flex gap-4 text-sm">

    <div class="flex items-center gap-1">
      <span class="w-3 h-3 bg-green-500 rounded-full"></span>
      <span id="open-count">Open</span>
    </div>

    <div class="flex items-center gap-1">
      <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
      <span id="closed-count">Closed</span>
    </div>

  </div>

</div>

 

 <!-- ================= LOADER ================= -->

<div id="loader" class="flex justify-center mt-10 hidden">
<span class="loading loading-spinner loading-lg"></span>
</div>


<!-- ================= ISSUE GRID ================= -->
 <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 p-4" id="issues-container">

   <!--card gula-->
  <div id="card-1" class="bg-white rounded-xl shadow-sm border-t-4 border-green-500 p-4 space-y-3 hover:shadow-md transition">

    <!-- top -->
    <div class="flex justify-between items-center">

      <!-- IMAGE -->
      <div class="flex items-center gap-2">
        <img id="issue-image"
             src="./Open-Status.png"
             class="w-6 h-6 rounded-full object-cover">
      </div>

      <span id="priority"
        class="text-xs font-semibold px-3 py-1 rounded-full bg-red-100 text-red-500">
        HIGH
      </span>

    </div>

    <!-- title -->
    <h3 id="title" class="font-semibold text-gray-800 leading-snug">
      Fix Navigation Menu On Mobile Devices
    </h3>

    <!-- description -->
    <p id="description" class="text-sm text-gray-500">
      The navigation menu doesn't collapse properly on mobile devices.
    </p>

    <!-- labels -->
    <div class="flex gap-2">
      <span id="bug"
        class="text-xs px-2 py-1 rounded-full border border-red-200 text-red-500 bg-red-50">
        BUG
      </span>

      <span id="help"
        class="text-xs px-2 py-1 rounded-full border border-yellow-200 text-yellow-600 bg-yellow-50">
        HELP WANTED
      </span>
    </div>
 <!--footer-->
    <div class="flex justify-between text-xs text-gray-400 pt-2 border-t">
      <span id="author">#1 by john_doe</span>
      <span id="date">1/15/2024</span>
    </div>

  </div>

</div>

 

   
  
<!-- ================= MODAL =================!-->
 <dialog id="issue-modal" class="modal">

  <div class="modal-box w-full max-w-xl rounded-2xl bg-white p-6 shadow-2xl">

    <!-- Title -->
    <h3 id="modal-title" class="text-xl font-semibold text-gray-800"></h3>

    <!-- Labels -->
    <div id="modal-labels" class="flex gap-2 mt-2"></div>

    <!-- Description -->
    <p id="modal-description" class="mt-4 text-gray-600 leading-relaxed"></p>

    <!-- Divider -->
    <div class="border-t my-4"></div>

    <!-- Info Grid -->
    <div class="grid grid-cols-2 gap-4 text-sm">

      <div class="bg-gray-50 p-3 rounded-lg">
        <p class="text-gray-500">Status</p>
        <span id="modal-status" class="text-green-600 font-medium"></span>
      </div>

      <div class="bg-gray-50 p-3 rounded-lg">
        <p class="text-gray-500">Priority</p>
        <span id="modal-priority" class="font-medium"></span>
      </div>

      <div class="bg-gray-50 p-3 rounded-lg">
        <p class="text-gray-500">Author</p>
        <span id="modal-author" class="font-medium text-gray-700"></span>
      </div>

      <div class="bg-gray-50 p-3 rounded-lg">
        <p class="text-gray-500">Created</p>
        <span id="modal-date" class="text-gray-700"></span>
      </div>

    </div>

    <!-- Close Button -->
    <div class="modal-action mt-6 flex justify-end">

      <button
        id="modal-close"
        class="px-5 py-2 rounded-lg bg-gradient-to-r from-purple-500 to-indigo-500 text-white font-medium hover:opacity-90 transition">
        Close
      </button>

    </div>

  </div>

</dialog>

<script src="./main.js"></script>

</body>
</html>
