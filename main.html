 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Issue Tracker</title>

<!-- DaisyUI -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

<!-- Tailwind -->
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

<!-- Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<style>
body{
font-family: "Geist", sans-serif;
}
</style>

</head>

<body class="bg-gray-100 space-y-4">

<!-- ================= NAVBAR ================= -->

<div class="navbar bg-white shadow px-6">

<!-- LEFT -->

<div class="flex items-center gap-2 flex-1">

<img src="./github-logo.png" class="w-10 h-10">

<h1 id="site-title" class="text-lg font-semibold">
GitHub Issues Tracker
</h1>

</div>


<!-- RIGHT -->

<div class="flex items-center gap-3">

<div class="relative">

<i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400"></i>

<input
id="search-input"
type="text"
placeholder="Search issues..."
class="input input-bordered pl-10 w-56"
/>

</div>

<button id="new-issue-btn" class="btn btn-primary rounded-md">
<i class="fa-solid fa-plus"></i>
New Issue
</button>

</div>

</div>

<div class="flex items-center space-x-2 bg-white p-2 rounded-lg border border-gray-100 w-fit" id="filter-container">
  
  <button id="btn-all" class="filter-btn px-6 py-2 rounded-md text-sm font-medium bg-[#5D00FF] text-white transition-all duration-200">
    All
  </button>

  <button id="btn-open" class="filter-btn px-6 py-2 rounded-md text-sm font-medium text-gray-500 border border-gray-200 bg-white hover:bg-gray-50 transition-all duration-200">
    Open
  </button>

  <button id="btn-closed" class="filter-btn px-6 py-2 rounded-md text-sm font-medium text-gray-500 border border-gray-200 bg-white hover:bg-gray-50 transition-all duration-200">
    Closed
  </button>
  
</div>


   
   

 <!-- Issue Info -->
<div class="bg-white p-5 rounded-lg shadow flex justify-between items-center">

  <div class="flex items-center gap-3">

    
    <div class="text-2xl w-5 h-5">
      <img src="./Aperture.png">
    </div>

    <div>
      <h2 id="issue-count" class="font-semibold text-lg">
        50 Issues
      </h2>

      <p class="text-gray-500 text-sm">
        Track and manage your project issues
      </p>
    </div>

  </div>

  <div class="flex gap-4 text-sm">

    <div class="flex items-center gap-1">
      <span class="w-3 h-3 bg-green-500 rounded-full"></span>
      <span id="open-count">Open</span>
    </div>

    <div class="flex items-center gap-1">
      <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
      <span id="closed-count">Closed</span>
    </div>

  </div>

</div>


<!-- ================= LOADER ================= -->

<div id="loader" class="flex justify-center mt-10 hidden">
<span class="loading loading-spinner loading-lg"></span>
</div>


<!-- ================= ISSUE GRID ================= -->

<section class="max-w-7xl mx-auto mt-8 px-4">

<div id="issue-container"
class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">


<!-- SAMPLE CARD -->

<div class="card bg-white shadow border-t-4 border-green-500 cursor-pointer space-y-3">

<div class="card-body p-4">

<div class="flex justify-between items-center">

<span class="badge badge-success text-xs">

    <img src="./Open-Status.png" class="w-4 h-4 object-cover">
</span>

<span class="badge badge-warning text-xs">
HIGH
</span>

</div>

<h2 class="font-semibold text-sm mt-2">
Fix Navigation Menu On Mobile Devices
</h2>

<p class="text-xs text-[#64748B]">
The navigation menu doesn't collapse properly on mobile devices.
</p>

<div class="flex gap-2 mt-3">

<span class="badge badge-error badge-outline text-xs">
    <i class="fa-solid fa-bug"></i>
BUG
</span>

<span class="badge badge-warning badge-outline text-xs">
    <i class="fa-regular fa-life-ring"></i>
HELP WANTED
</span>

</div>

<div class="text-xs text-gray-400 mt-3">

<span class="text-[#64748B]">
#1 by john_doe
</span>

<br>

<span class="text-[#64748B]">
1/15/2024
</span>

</div>

</div>

</div>

</div>

</section>


<!-- ================= MODAL ================= -->

<dialog id="issue-modal" class="modal">

<div class="modal-box">

<h3 id="modal-title" class="font-bold text-lg"></h3>

<p id="modal-description" class="py-3"></p>

<div class="space-y-1 text-sm">

<p><strong>Status:</strong> <span id="modal-status"></span></p>
<p><strong>Priority:</strong> <span id="modal-priority"></span></p>
<p><strong>Author:</strong> <span id="modal-author"></span></p>
<p><strong>Label:</strong> <span id="modal-label"></span></p>
<p><strong>Created:</strong> <span id="modal-date"></span></p>

</div>

<div class="modal-action">
<button id="modal-close" class="btn">
Close
</button>
</div>

</div>

</dialog>

</body>
</html>
